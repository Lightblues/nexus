appId: site.easonsi.nexus
productName: Nexus
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintrc,.prettierrc,tsconfig*.json}'
  - '!{*.md}'
mac:
  icon: build/icon.png
  # Ad-hoc codesign (no Apple Developer ID). electron-builder delegates to
  # @electron/osx-sign which signs nested frameworks/helpers inside-out —
  # the order matters for Electron apps. Do NOT replace this with a custom
  # `codesign --deep` afterPack hook; that breaks nested bundle signatures
  # and causes "different Team IDs" dyld errors at launch.
  identity: '-'
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Application needs to access Documents folder.
    - NSDownloadsFolderUsageDescription: Application needs to access Downloads folder.
  notarize: false
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  type: distribution
  category: public.app-category.productivity
  artifactName: '${productName}-${version}-${arch}.${ext}'
protocols:
  - name: Nexus URL Scheme
    schemes:
      - nexus
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380
