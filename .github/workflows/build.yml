name: Build Nexus

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 0.1.0)'
        required: false
        default: ''
  push:
    tags:
      - 'nexus-v*'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build

      - name: Build macOS DMG (arm64)
        run: npx electron-builder --mac --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS DMG (x64)
        run: npx electron-builder --mac --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-arm64
          path: dist/*-arm64*.dmg
          if-no-files-found: error
          retention-days: 7

      - name: Upload x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-x64
          path: dist/*-x64*.dmg
          if-no-files-found: error
          retention-days: 7

      - name: List dist contents
        run: ls -la dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/nexus-v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/nexus-v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Nexus v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: artifacts/**/*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Update Homebrew tap (inline, avoids GITHUB_TOKEN event limitation) ---

      - name: Compute DMG sha256
        id: hash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ARM_DMG=$(find artifacts -name "*-arm64*.dmg" | head -1)
          INTEL_DMG=$(find artifacts -name "*-x64*.dmg" | head -1)

          echo "ARM_SHA=$(sha256sum "$ARM_DMG"   | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "INTEL_SHA=$(sha256sum "$INTEL_DMG" | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: lightblues/homebrew-tap
          token: ${{ secrets.TAP_PUSH_TOKEN }}
          path: tap

      - name: Update cask file
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ARM_SHA="${{ steps.hash.outputs.ARM_SHA }}"
          INTEL_SHA="${{ steps.hash.outputs.INTEL_SHA }}"
          CASK=tap/Casks/nexus.rb

          python3 - <<PY
          import re, pathlib
          p = pathlib.Path("${CASK}")
          s = p.read_text()
          s = re.sub(r'version "[^"]+"',           f'version "${VERSION}"', s, count=1)
          s = re.sub(r'arm:\s*"[0-9a-f]{64}"',     f'arm:   "${ARM_SHA}"', s, count=1)
          s = re.sub(r'intel:\s*"[0-9a-f]{64}"',   f'intel: "${INTEL_SHA}"', s, count=1)
          p.write_text(s)
          PY

          cat "$CASK"

      - name: Push cask update
        working-directory: tap
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/nexus.rb
          git diff --cached --quiet && { echo "No changes"; exit 0; }
          git commit -m "nexus: bump to ${{ steps.version.outputs.VERSION }}"
          git push
