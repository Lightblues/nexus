name: Build Nexus

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 0.1.0)'
        required: false
        default: ''
  push:
    tags:
      - 'nexus-v*'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build

      - name: Build macOS DMG (arm64)
        run: npx electron-builder --mac --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS DMG (x64)
        run: npx electron-builder --mac --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-arm64
          path: dist/*-arm64*.dmg
          if-no-files-found: error
          retention-days: 7

      - name: Upload x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-x64
          path: dist/*-x64*.dmg
          if-no-files-found: error
          retention-days: 7

      - name: List dist contents
        run: ls -la dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/nexus-v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/nexus-v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Nexus v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: artifacts/**/*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
